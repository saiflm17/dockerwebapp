---
version: "3"
services:
     devopsdb:
         container_name: devopsdb
         image: saikumar1817/repo100:v1
         ports:
          - "3306:3306"

     application:
         container_name: application
         image: saikumar1817/repo100:v2
         ports:
          - "8080:8080"
         depends_on:
          - "devopsdb"
